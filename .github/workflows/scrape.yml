name: Wind Data Collector

on:
  schedule:
    - cron: '0 6 * * *'  # Runs at 6:00 AM UTC every day
  workflow_dispatch:     # Allows manual triggering

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Create Firebase service account file
        run: |
          mkdir -p .secrets
          echo '${{ secrets.FIREBASE_CREDENTIALS }}' > .secrets/serviceAccountKey.json
          # Validate JSON syntax (jq is preinstalled on ubuntu runners)
          jq empty .secrets/serviceAccountKey.json || (echo "Invalid JSON!" && exit 1)

      - name: Run collector
        run: python scraper.py

      - name: Clean up sensitive files
        if: always()   # run even if the collector step fails
        run: |
          rm -rf .secrets
          echo "Cleaned up sensitive files"
